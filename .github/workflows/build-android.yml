name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    paths:
      - 'flutter/**'
      - 'src/**'
      - '.github/workflows/build-android.yml'
  pull_request:

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r27c"
  CARGO_NDK_VERSION: "3.1.2"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"

jobs:
  build-android:
    name: Build Android APK (${{ matrix.job.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-linux-android, arch: arm64-v8a, ndk_script: ndk_arm64.sh, flutter_arch: android-arm64 }
          - { target: armv7-linux-androideabi, arch: armeabi-v7a, ndk_script: ndk_arm.sh, flutter_arch: android-arm }
          - { target: x86_64-linux-android, arch: x86_64, ndk_script: ndk_x64.sh, flutter_arch: android-x64 }

    steps:
    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v6
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          curl \
          gcc-multilib \
          git \
          g++ \
          g++-multilib \
          libayatana-appindicator3-dev \
          libasound2-dev \
          libc6-dev \
          libclang-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libgtk-3-dev \
          libpam0g-dev \
          libpulse-dev \
          libva-dev \
          libxcb-randr0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxdo-dev \
          libxfixes-dev \
          llvm-dev \
          nasm \
          ninja-build \
          openjdk-17-jdk-headless \
          pkg-config \
          tree \
          wget

    - name: Setup vcpkg with Github Actions binary cache
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: /opt/artifacts/vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

    - name: Install vcpkg dependencies
      run: |
        case ${{ matrix.job.target }} in
          aarch64-linux-android) ANDROID_TARGET=arm64-v8a ;;
          armv7-linux-androideabi) ANDROID_TARGET=armeabi-v7a ;;
          x86_64-linux-android) ANDROID_TARGET=x86_64 ;;
        esac
        ./flutter/build_android_deps.sh "${ANDROID_TARGET}"

    - name: Install flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Patch flutter
      run: |
        cd $(dirname $(dirname $(which flutter)))
        [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff || true

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: ${{ env.NDK_VERSION }}
        add-to-path: true

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        components: "rustfmt"

    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: rustdesk-lib-cache-android
        key: ${{ matrix.job.target }}

    - name: Build rustdesk lib
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        rustup target add ${{ matrix.job.target }}
        cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
        ./flutter/${{ matrix.job.ndk_script }}
        mkdir -p ./flutter/android/app/src/main/jniLibs/${{ matrix.job.arch }}
        cp ./target/${{ matrix.job.target }}/release/liblibrustdesk.so ./flutter/android/app/src/main/jniLibs/${{ matrix.job.arch }}/librustdesk.so

    - name: Build Flutter APK
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
        sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" ./flutter/android/gradle.properties
        sed -i "s/signingConfigs.release/signingConfigs.debug/g" ./flutter/android/app/build.gradle
        cd flutter
        flutter build apk --release --target-platform ${{ matrix.job.flutter_arch }} --split-per-abi
        mkdir -p ../output
        mv build/app/outputs/flutter-apk/app-${{ matrix.job.arch }}-release.apk ../output/rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-android-${{ matrix.job.arch }}
        path: output/*.apk
        retention-days: 30
