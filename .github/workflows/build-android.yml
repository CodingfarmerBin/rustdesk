name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r27c"
  VERSION: "1.4.6"

jobs:
  build-android:
    name: Build Android APK (${{ matrix.job.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-linux-android, arch: arm64-v8a, flutter-arch: android-arm64 }
          - { target: armv7-linux-androideabi, arch: armeabi-v7a, flutter-arch: android-arm }
          - { target: x86_64-linux-android, arch: x86_64, flutter-arch: android-x64 }

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        targets: ${{ matrix.job.target }}

    - name: Install Rust NDK
      run: cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }}
      env:
        CARGO_NDK_VERSION: "3.1.2"

    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: ${{ env.NDK_VERSION }}
        add-to-path: true

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          cmake \
          curl \
          gcc \
          git \
          g++ \
          libasound2-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libgtk-3-dev \
          libpulse-dev \
          libva-dev \
          libvdpau-dev \
          libxcb-randr0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxdo-dev \
          libxfixes-dev \
          nasm \
          pkg-config

    - name: Build Rustdesk library
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
        ./flutter/build_android_deps.sh ${{ matrix.job.target }}

    - name: Build Flutter APK
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      run: |
        export PATH=/usr/lib/jvm/java-17-openjdk-amd64/bin:$PATH
        # Increase Gradle JVM memory for CI builds
        sed -i "s/org.gradle.jvmargs=-Xmx1024M/org.gradle.jvmargs=-Xmx2g/g" ./flutter/android/gradle.properties
        # Use debug sign config for CI builds
        sed -i "s/signingConfigs.release/signingConfigs.debug/g" ./flutter/android/app/build.gradle

        cd flutter
        flutter build apk --release --target-platform ${{ matrix.job.flutter-arch }} --split-per-abi

        mkdir -p ../output
        mv build/app/outputs/flutter-apk/app-${{ matrix.job.arch }}-release.apk ../output/rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-android-${{ matrix.job.arch }}
        path: output/*.apk
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ env.VERSION }}-${{ github.run_number }}
        draft: false
        prerelease: true
        files: output/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
