name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - windows
          - linux
          - macos
  push:
    branches: [ master, main ]
  pull_request:

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r27c"
  CARGO_NDK_VERSION: "3.1.2"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"

jobs:
  build-windows:
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    name: Build Windows
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        targets: "x86_64-pc-windows-msvc"
    - name: Install LLVM
      uses: KyleMayes/install-llvm-action@v1
      with:
        version: "15.0.6"
    - name: Install dependencies
      run: choco install cmake ninja nasm -y
    - name: Build
      run: python3 build.py --flutter --hwcodec --skip-portable-pack
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-x64
        path: flutter/build/windows/x64/runner/Release/*
        retention-days: 30

  build-linux:
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux'
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake curl gcc git g++ libasound2-dev libunwind-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgtk-3-dev libpulse-dev \
          libva-dev libvdpau-dev libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
          libxdo-dev libxfixes-dev nasm pkg-config libvpx-dev libyuv-dev libopus-dev libaom-dev
    - name: Build
      run: python3 build.py --flutter --hwcodec
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-linux-x64
        path: flutter/build/linux/x64/release/bundle/*
        retention-days: 30

  build-macos:
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos'
    name: Build macOS
    runs-on: macos-13
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.MAC_RUST_VERSION }}
    - name: Install dependencies
      run: brew install pkg-config nasm
    - name: Build
      run: python3 build.py --flutter --hwcodec
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-macos
        path: flutter/build/macos/Build/Products/Release/*
        retention-days: 30

  build-android:
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
    name: Build Android (${{ matrix.job.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: aarch64-linux-android, arch: arm64-v8a, ndk_script: ndk_arm64.sh, flutter_arch: android-arm64 }
          - { target: armv7-linux-androideabi, arch: armeabi-v7a, ndk_script: ndk_arm.sh, flutter_arch: android-arm }
          - { target: x86_64-linux-android, arch: x86_64, ndk_script: ndk_x64.sh, flutter_arch: android-x64 }
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: /opt/artifacts/vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
    - name: Install vcpkg deps
      run: |
        case ${{ matrix.job.target }} in
          aarch64-linux-android) ANDROID_TARGET=arm64-v8a ;;
          armv7-linux-androideabi) ANDROID_TARGET=armeabi-v7a ;;
          x86_64-linux-android) ANDROID_TARGET=x86_64 ;;
        esac
        ./flutter/build_android_deps.sh "${ANDROID_TARGET}"
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}
    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: ${{ env.NDK_VERSION }}
        add-to-path: true
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
    - name: Build Rust library
      run: |
        rustup target add ${{ matrix.job.target }}
        cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked
        ./flutter/${{ matrix.job.ndk_script }}
    - name: Build APK
      run: |
        cd flutter
        flutter build apk --release --target-platform ${{ matrix.job.flutter_arch }} --split-per-abi
        mkdir -p ../output
        mv build/app/outputs/flutter-apk/app-${{ matrix.job.arch }}-release.apk ../output/rustdesk-${{ env.VERSION }}-${{ matrix.job.arch }}.apk
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-android-${{ matrix.job.arch }}
        path: output/*.apk
        retention-days: 30
